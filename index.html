<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard AdvBox</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 24px;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e293b;
    }
    h1 { font-size: 24px; font-weight: 600; }
    .refresh-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .refresh-btn:hover { background: #2563eb; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid #1e293b;
      overflow-x: auto;
    }
    .tab {
      padding: 10px 16px;
      background: transparent;
      color: #94a3b8;
      border: none;
      cursor: pointer;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    .tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .metric-card {
      background: #1e293b;
      padding: 16px;
      border-radius: 12px;
    }
    .metric-label {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    .metric-value {
      font-size: 28px;
      font-weight: 600;
      color: #f1f5f9;
    }
    .metric-value.warning { color: #f59e0b; }
    .metric-value.success { color: #10b981; }
    .metric-value.danger { color: #ef4444; }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 16px;
      color: #f1f5f9;
    }
    .chart-container {
      position: relative;
      height: 280px;
    }
    .list-item {
      padding: 12px 0;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item-main { flex: 1; }
    .list-item-title { font-weight: 500; margin-bottom: 2px; }
    .list-item-subtitle { font-size: 13px; color: #94a3b8; }
    .list-item-meta { font-size: 12px; color: #64748b; white-space: nowrap; }

    .loading {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
    }
    .empty {
      text-align: center;
      padding: 40px;
      color: #64748b;
      font-size: 14px;
    }
    .error {
      background: #7f1d1d;
      color: #fecaca;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      background: #334155;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚖️ Dashboard AdvBox</h1>
      <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">Atualizar dados</button>
    </header>

    <div id="errorBox"></div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('overview', event)">Visão geral</button>
      <button class="tab" onclick="showTab('processes', event)">Processos</button>
      <button class="tab" onclick="showTab('movements', event)">Movimentações</button>
      <button class="tab" onclick="showTab('financial', event)">Financeiro</button>
      <button class="tab" onclick="showTab('clients', event)">Clientes</button>
    </div>

    <!-- ABA 1: VISÃO GERAL -->
    <div id="overview" class="tab-content active">
      <div class="metrics">
        <div class="metric-card">
          <div class="metric-label">Total de processos</div>
          <div class="metric-value" id="totalProcessos">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Tarefas pendentes</div>
          <div class="metric-value warning" id="tarefasPendentes">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">A receber</div>
          <div class="metric-value success" id="aReceber">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">A pagar</div>
          <div class="metric-value danger" id="aPagar">-</div>
        </div>
      </div>
    </div>

    <!-- ABA 2: PROCESSOS -->
    <div id="processes" class="tab-content">
      <div class="card">
        <div class="card-title">Processos por fase</div>
        <div class="chart-container">
          <canvas id="chartFases"></canvas>
        </div>
      </div>
    </div>

    <!-- ABA 3: MOVIMENTAÇÕES -->
    <div id="movements" class="tab-content">
      <div class="card">
        <div class="card-title">Últimas movimentações</div>
        <div id="listaMovimentacoes"><div class="loading">Carregando...</div></div>
      </div>
    </div>

    <!-- ABA 4: FINANCEIRO -->
    <div id="financial" class="tab-content">
      <div class="metrics">
        <div class="metric-card">
          <div class="metric-label">Recebido no mês</div>
          <div class="metric-value success" id="recebidoMes">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Pago no mês</div>
          <div class="metric-value danger" id="pagoMes">-</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Próximos vencimentos</div>
        <div id="listaVencimentos"><div class="loading">Carregando...</div></div>
      </div>
    </div>

    <!-- ABA 5: CLIENTES -->
    <div id="clients" class="tab-content">
      <div class="metrics">
        <div class="metric-card">
          <div class="metric-label">Total de clientes</div>
          <div class="metric-value" id="totalClientes">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Aniversariantes do mês</div>
          <div class="metric-value" id="totalAniversariantes">-</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">🎂 Aniversariantes do mês</div>
        <div id="listaAniversariantes"><div class="loading">Carregando...</div></div>
      </div>
    </div>
  </div>

  <script>
    let chartFases = null;

    function showTab(name, evt) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(name).classList.add('active');
      if (evt) evt.target.classList.add('active');
    }

    function showError(msg) {
      document.getElementById('errorBox').innerHTML = 
        `<div class="error">⚠️ ${msg}</div>`;
    }

    function clearError() {
      document.getElementById('errorBox').innerHTML = '';
    }

    function formatMoney(v) {
      if (v == null) return 'R$ 0';
      return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    async function fetchJson(url) {
      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro na requisição');
      return data;
    }

    // Carrega tudo
    async function loadAll() {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.textContent = 'Carregando...';
      clearError();

      try {
        await Promise.all([
          loadSettings(),
          loadLawsuits(),
          loadMovements(),
          loadTransactions(),
          loadCustomers(),
          loadBirthdays(),
          loadPosts()
        ]);
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Atualizar dados';
      }
    }

    let settingsCache = null;
    async function loadSettings() {
      try {
        settingsCache = await fetchJson('/api/settings');
      } catch (e) { console.error('settings:', e); }
    }

    async function loadLawsuits() {
      try {
        const data = await fetchJson('/api/lawsuits');
        const lawsuits = data.data || [];
        document.getElementById('totalProcessos').textContent = data.totalCount || lawsuits.length;

        // Agrupa por fase
        const porFase = {};
        lawsuits.forEach(l => {
          const fase = l.stage || l.step || 'Sem fase';
          porFase[fase] = (porFase[fase] || 0) + 1;
        });

        const labels = Object.keys(porFase);
        const values = Object.values(porFase);

        if (chartFases) chartFases.destroy();
        chartFases = new Chart(document.getElementById('chartFases'), {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              label: 'Processos',
              data: values,
              backgroundColor: '#3b82f6'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
              x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
            }
          }
        });
      } catch (e) { console.error('lawsuits:', e); }
    }

    async function loadMovements() {
      try {
        const data = await fetchJson('/api/last-movements');
        const movs = data.data || [];
        const container = document.getElementById('listaMovimentacoes');
        if (movs.length === 0) {
          container.innerHTML = '<div class="empty">Sem movimentações recentes</div>';
          return;
        }
        container.innerHTML = movs.map(m => `
          <div class="list-item">
            <div class="list-item-main">
              <div class="list-item-title">${m.process_number || m.protocol_number || 'Processo #' + m.lawsuit_id}</div>
              <div class="list-item-subtitle">${(m.description || '').substring(0, 120)}</div>
            </div>
            <div class="list-item-meta">${m.date || ''}</div>
          </div>
        `).join('');
      } catch (e) { console.error('movements:', e); }
    }

    async function loadTransactions() {
      try {
        const data = await fetchJson('/api/transactions');
        const trans = data.data || [];
        
        let aReceber = 0, aPagar = 0, recebidoMes = 0, pagoMes = 0;
        const hoje = new Date();
        const inicioMes = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
        const vencimentos = [];

        trans.forEach(t => {
          const valor = Number(t.amount || t.value || 0);
          const tipo = (t.type || '').toLowerCase();
          const pago = t.paid_at || t.paid;
          
          if (!pago) {
            if (tipo.includes('credit') || tipo === 'receita' || tipo === 'income') aReceber += valor;
            else aPagar += valor;
            if (t.due_date) vencimentos.push(t);
          } else {
            const dataPg = new Date(pago);
            if (dataPg >= inicioMes) {
              if (tipo.includes('credit') || tipo === 'receita' || tipo === 'income') recebidoMes += valor;
              else pagoMes += valor;
            }
          }
        });

        document.getElementById('aReceber').textContent = formatMoney(aReceber);
        document.getElementById('aPagar').textContent = formatMoney(aPagar);
        document.getElementById('recebidoMes').textContent = formatMoney(recebidoMes);
        document.getElementById('pagoMes').textContent = formatMoney(pagoMes);

        const lista = document.getElementById('listaVencimentos');
        if (vencimentos.length === 0) {
          lista.innerHTML = '<div class="empty">Sem vencimentos pendentes</div>';
        } else {
          lista.innerHTML = vencimentos.slice(0, 10).map(t => `
            <div class="list-item">
              <div class="list-item-main">
                <div class="list-item-title">${t.description || 'Transação'}</div>
                <div class="list-item-subtitle">${formatMoney(t.amount || t.value)}</div>
              </div>
              <div class="list-item-meta">${t.due_date || ''}</div>
            </div>
          `).join('');
        }
      } catch (e) { console.error('transactions:', e); }
    }

    async function loadCustomers() {
      try {
        const data = await fetchJson('/api/customers');
        document.getElementById('totalClientes').textContent = data.totalCount || (data.data || []).length;
      } catch (e) { console.error('customers:', e); }
    }

    async function loadBirthdays() {
      try {
        const data = await fetchJson('/api/birthdays');
        const lista = data.data || [];
        document.getElementById('totalAniversariantes').textContent = lista.length;
        const container = document.getElementById('listaAniversariantes');
        if (lista.length === 0) {
          container.innerHTML = '<div class="empty">Sem aniversariantes este mês</div>';
          return;
        }
        container.innerHTML = lista.map(c => `
          <div class="list-item">
            <div class="list-item-main">
              <div class="list-item-title">${c.name || ''}</div>
              <div class="list-item-subtitle">${c.cellphone || c.phone || c.email || ''}</div>
            </div>
            <div class="list-item-meta">${c.birthdate || ''}</div>
          </div>
        `).join('');
      } catch (e) { console.error('birthdays:', e); }
    }

    async function loadPosts() {
      try {
        const data = await fetchJson('/api/posts');
        const posts = data.data || [];
        const pendentes = posts.filter(p => !p.completed_at && !p.completed).length;
        document.getElementById('tarefasPendentes').textContent = pendentes || posts.length;
      } catch (e) { console.error('posts:', e); }
    }

    // Carrega tudo quando a página abrir
    loadAll();
  </script>
</body>
</html>
